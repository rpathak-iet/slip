<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVV Payroll – PDF named as MONTH.pdf</title>
    <style>
        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background: #e6e9ef; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .form-container { max-width: 1200px; width: 100%; background: white; box-shadow: 0 8px 20px rgba(0,0,0,0.2); padding: 20px 25px; border: 2px solid #2c3e50; }
        .univ-line { display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.2rem; background: #f0f3f8; padding: 10px 10px; border: 1px solid #333; margin: 10px 0 0 0; }
        .univ-line span:first-child { font-size:1.3rem; }
        .sno-field { display:flex; align-items:center; gap:5px; }
        .sno-field input { width:100px; }
        hr.thick { border:none; border-top:4px solid #2c3e50; margin:5px 0; }
        hr.light { border:none; border-top:2px solid #7f8c8d; margin:6px 0; }
        .grid-2col { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin:5px 0; }
        .field-row { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
        .field-row label { font-weight:bold; white-space:nowrap; }
        .field-row input, .field-row select { padding:4px 8px; border:1px solid #000; background:#fff; min-width:150px; }
        .section-header { font-weight:bold; font-size:1.4rem; text-decoration:underline; margin:10px 0 5px; }
        .grid-item { display:flex; align-items:center; gap:10px; }
        .grid-item label { font-weight:bold; width:80px; }
        .grid-item input { width:200px; }
        .total-section { display:flex; justify-content:space-between; background:#d5dbdb; padding:8px 15px; font-weight:bold; border:1px solid #2c3e50; margin:10px 0; flex-wrap:wrap; }
        .bank-line { display:flex; gap:20px; align-items:center; flex-wrap:wrap; background:#ecf0f1; padding:12px 15px; border:1px solid #2c3e50; margin:10px 0; font-weight:bold; }
        .bank-line input { width:130px; }
        .button-bar { display:flex; gap:15px; justify-content:flex-end; margin:25px 0 10px; flex-wrap:wrap; }
        button { background:#2c3e50; color:white; border:none; padding:12px 28px; font-size:1.1rem; font-weight:bold; cursor:pointer; border-radius:6px; box-shadow:0 3px 0 #1a252f; border:1px solid #0f1a24; }
        button:hover { background:#1e2b37; transform:translateY(-2px); box-shadow:0 5px 0 #0f1a24; }
        button.clear-btn { background:#b03a2e; box-shadow:0 3px 0 #7b2c23; }
        .saved-records-panel { background:#f8f9fa; border:2px solid #2c3e50; padding:15px; margin:10px 0; }
        .record-selector { display:flex; gap:15px; align-items:center; flex-wrap:wrap; }
        select { padding:8px 12px; font-size:1rem; min-width:250px; }
        .info-note { font-size:0.9rem; background:#ddf4ff; padding:5px 10px; border-radius:20px; }
        .small-note { font-size:0.8rem; color:#444; }
        .colon-right { display:flex; align-items:center; gap:10px; }
        .colon-right span { font-weight:bold; margin-left:20px; }
    </style>
</head>
<body>
<div class="form-container" id="payform">
    <div class="univ-line">
        <span>DEVI AHILYA VISHWAVIDYALAYA, INDORE</span>
        <div class="sno-field"><span>SNO:</span><input type="text" id="sno" placeholder="serial no" size="12"></div>
    </div>
    <hr class="thick">

    <div class="grid-2col">
        <div class="field-row"><label>DEPT NAME :</label> <input type="text" id="dept" placeholder="dept name"></div>
        <div class="field-row"><label>MONTH:</label>
            <select id="month">
                <option value="JAN-26">JAN-26</option><option value="FEB-26" selected>FEB-26</option><option value="MAR-26">MAR-26</option>
                <option value="APR-26">APR-26</option><option value="MAY-26">MAY-26</option><option value="JUN-26">JUN-26</option>
                <option value="JUL-26">JUL-26</option><option value="AUG-26">AUG-26</option><option value="SEP-26">SEP-26</option>
                <option value="OCT-26">OCT-26</option><option value="NOV-26">NOV-26</option><option value="DEC-26">DEC-26</option>
                <option value="JAN-27">JAN-27</option><option value="FEB-27">FEB-27</option>
            </select>
        </div>
    </div>

    <div class="grid-2col">
        <div class="field-row"><label>NAME:</label> <input type="text" id="name" placeholder="full name"></div>
        <div class="field-row"><label>DESG.</label> <input type="text" id="desg" placeholder="designation"></div>
    </div>

    <div style="display: flex; flex-wrap: wrap; gap: 20px; align-items: center; margin: 10px 0;">
        <div class="field-row"><label>EMP NO:</label> <input type="text" id="empno" size="12"></div>
        <div class="field-row"><label>PF NO.:</label> <input type="text" id="pfno" size="12"></div>
        <div class="field-row"><label>UCS NO:</label> <input type="text" id="ucsno" size="12"></div>
        <div class="field-row"><label>GRADE:</label>
            <select id="grade">
                <option value="37400-67000(9000)">37400-67000(9000)</option>
                <option value="47600-82000(10000)">47600-82000(10000)</option>
            </select>
        </div>
        <div class="field-row"><label>W.Days:</label> <input type="text" id="wdays" size="8" placeholder="e.g. 28/28"></div>
        <div class="field-row"><label>PFNO(SF):</label> <input type="text" id="pfnosf" size="12"></div>
        <div class="field-row"><label>ESIS No:</label> <input type="text" id="esisno" size="12"></div>
    </div>

    <hr class="thick">
    <div class="grid-2col"><div class="section-header">EARNINGS</div><div class="section-header">DEDUCTIONS</div></div>
    <hr class="light">

    <div class="grid-2col" style="align-items: start;">
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <div class="grid-item"><label>BASIC</label> <input type="text" id="basic" value="0"></div>
            <div class="grid-item"><label>DA</label> <input type="text" id="da" value="0"></div>
            <div class="grid-item"><label>MA</label> <input type="text" id="ma" value="0"></div>
            <div class="grid-item"><label>HRA</label> <input type="text" id="hra" value="0"></div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <div class="colon-right"><span>:</span> <label>HR &amp; W</label> <input type="text" id="hrw" value="0"></div>
            <div class="colon-right"><span>:</span> <label>I-TAX</label> <input type="text" id="itax" value="0"></div>
            <div class="colon-right"><span>:</span> <label>C-PEN-F</label> <input type="text" id="cpenf" value="0"></div>
            <div class="colon-right"><span>:</span> <label>MEDCLM</label> <input type="text" id="medclm" value="0"></div>
            <div class="colon-right"><span>:</span> <label>ProfTax</label> <input type="text" id="ptax" value="0"></div>
            <div class="colon-right"><span>:</span> <label>BIJLI.CH</label> <input type="text" id="bijlich" value="0"></div>
        </div>
    </div>

    <hr class="thick">
    <div class="total-section">
        <span>TOTAL EARNINGS: <span id="totalEarningsDisplay">0</span></span>
        <span>TOTAL DEDUCTIONS: <span id="totalDeductionsDisplay">0</span></span>
    </div>
    <hr class="thick">

    <div class="bank-line">
        <span>*BANK*</span>
        <span>c-pen-f <input type="text" id="bankCpenf" value="0" size="8"></span>
        <span>PF Contr. (=0.10*(BASIC+DA)) <input type="text" id="pfcontr" readonly value="0" size="10" style="background:#f3f3f3;"></span>
        <span>ESIS Contr: <input type="text" id="esiscontr" value="0" size="8"></span>
        <span>NET SALARY <input type="text" id="netsalary" readonly style="width:160px; background:#f3f3f3;"></span>
    </div>

    <div class="saved-records-panel">
        <div style="font-weight:bold; margin-bottom:10px;">📁 Saved Records</div>
        <div class="record-selector">
            <select id="savedSelector">
                <option value="">-- select a saved record (SNO) --</option>
            </select>
            <button id="loadBtn">LOAD</button>
            <button id="pdfBtn">📄 PDF</button>
            <button id="clearSelectedBtn" class="clear-btn">CLEAR</button>
        </div>
    </div>

    <div class="button-bar">
        <button id="saveBtn">💾 SAVE</button>
        <button id="pdfAllBtn">📄 GENERATE PDF</button>
    </div>
    <p class="small-note">* PF Contr. = ceil(0.10 × (BASIC+DA)). PDF filename = MONTH.pdf (e.g., FEB-26.pdf)</p>
</div>

<!-- jsPDF for exact canvas-based PDF rendering -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
(function() {
    // DOM refs
    const $ = id => document.getElementById(id);
    const snoInp      = $('sno');
    const deptInp     = $('dept');
    const monthSel    = $('month');
    const nameInp     = $('name');
    const desgInp     = $('desg');
    const empnoInp    = $('empno');
    const pfnoInp     = $('pfno');
    const ucsnoInp    = $('ucsno');
    const gradeSel    = $('grade');
    const wdaysInp    = $('wdays');
    const pfnosfInp   = $('pfnosf');
    const esisnoInp   = $('esisno');
    const basicInp    = $('basic');
    const daInp       = $('da');
    const maInp       = $('ma');
    const hraInp      = $('hra');
    const hrwInp      = $('hrw');
    const itaxInp     = $('itax');
    const cpenfInp    = $('cpenf');
    const medclmInp   = $('medclm');
    const ptaxInp     = $('ptax');
    const bijlichInp  = $('bijlich');
    const bankCpenfInp= $('bankCpenf');
    const pfcontrInp  = $('pfcontr');
    const esiscontrInp= $('esiscontr');
    const netsalaryInp= $('netsalary');
    const totalEarnSp = $('totalEarningsDisplay');
    const totalDedSp  = $('totalDeductionsDisplay');
    const savedSel    = $('savedSelector');

    // ── Utilities ─────────────────────────────────────────────────────
    function lpad(s, w) { s = String(s); return s.length >= w ? s : s + ' '.repeat(w - s.length); }
    function rpad(s, w) { s = String(s); return s.length >= w ? s : ' '.repeat(w - s.length) + s; }
    function n(v) { return parseFloat(v) || 0; }
    function fmtNum(v) { return (parseFloat(v)||0).toFixed(1); }

    // ── Compute totals and derived fields ────────────────────────────
    function computeTotals() {
        const b = n(basicInp.value), d = n(daInp.value), m = n(maInp.value), h = n(hraInp.value);
        const earn = b + d + m + h;
        const ded = n(hrwInp.value) + n(itaxInp.value) + n(cpenfInp.value) + n(medclmInp.value) + n(ptaxInp.value) + n(bijlichInp.value);
        pfcontrInp.value = Math.ceil(0.10 * (b + d));
        totalEarnSp.innerText = earn.toFixed(2);
        totalDedSp.innerText  = ded.toFixed(2);
        netsalaryInp.value    = (earn - ded).toFixed(2);
    }
    [basicInp,daInp,maInp,hraInp,hrwInp,itaxInp,cpenfInp,medclmInp,ptaxInp,bijlichInp].forEach(e => e.addEventListener('input', computeTotals));
    computeTotals();

    // ── Local Storage (key updated to include ptax) ───────────────────
    const KEY = 'davv_payroll_v2_ptax';
    function getRecs() { try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e){ return []; } }
    function setRecs(r){ localStorage.setItem(KEY, JSON.stringify(r)); }

    function getState() {
        return { sno:snoInp.value, dept:deptInp.value, month:monthSel.value, name:nameInp.value,
                 desg:desgInp.value, empno:empnoInp.value, pfno:pfnoInp.value, ucsno:ucsnoInp.value,
                 grade:gradeSel.value, wdays:wdaysInp.value, pfnosf:pfnosfInp.value, esisno:esisnoInp.value,
                 basic:basicInp.value, da:daInp.value, ma:maInp.value, hra:hraInp.value, hrw:hrwInp.value,
                 itax:itaxInp.value, cpenf:cpenfInp.value, medclm:medclmInp.value, ptax:ptaxInp.value, bijlich:bijlichInp.value,
                 bankCpenf:bankCpenfInp.value, esiscontr:esiscontrInp.value };
    }

    function loadState(s) {
        snoInp.value=s.sno||''; deptInp.value=s.dept||''; monthSel.value=s.month||'FEB-26';
        nameInp.value=s.name||''; desgInp.value=s.desg||''; empnoInp.value=s.empno||'';
        pfnoInp.value=s.pfno||''; ucsnoInp.value=s.ucsno||''; gradeSel.value=s.grade||'37400-67000(9000)';
        wdaysInp.value=s.wdays||''; pfnosfInp.value=s.pfnosf||''; esisnoInp.value=s.esisno||'';
        basicInp.value=s.basic||'0'; daInp.value=s.da||'0'; maInp.value=s.ma||'0'; hraInp.value=s.hra||'0';
        hrwInp.value=s.hrw||'0'; itaxInp.value=s.itax||'0'; cpenfInp.value=s.cpenf||'0';
        medclmInp.value=s.medclm||'0'; ptaxInp.value=s.ptax||'0'; bijlichInp.value=s.bijlich||'0';
        bankCpenfInp.value=s.bankCpenf||'0'; esiscontrInp.value=s.esiscontr||'0';
        computeTotals();
    }

    function refreshSel() {
        savedSel.innerHTML = '<option value="">-- select a saved record --</option>';
        getRecs().forEach((r,i) => {
            const o = document.createElement('option');
            o.value = i;
            o.textContent = `SNO:${r.sno||'?'} | ${r.name||'(no name)'} | ${r.month||''}`;
            savedSel.appendChild(o);
        });
    }

    $('saveBtn').addEventListener('click', () => {
        const recs = getRecs(); recs.push(getState()); setRecs(recs); refreshSel(); alert('Saved!');
    });
    $('loadBtn').addEventListener('click', () => {
        const idx = savedSel.value; if(idx===''){alert('Select a record');return;}
        loadState(getRecs()[parseInt(idx)]);
    });
    $('clearSelectedBtn').addEventListener('click', () => {
        const idx = savedSel.value; if(idx===''){alert('Select a record');return;}
        const recs=getRecs(); recs.splice(parseInt(idx),1); setRecs(recs); refreshSel(); alert('Cleared');
    });
    refreshSel();

    // ── PDF Generation – exactly DAVV format, filename = <MONTH>.pdf ──
    function fmt(v, dec=1) { return (parseFloat(v)||0).toFixed(dec); }

    $('pdfBtn').addEventListener('click', generatePDF);
    $('pdfAllBtn').addEventListener('click', generatePDF);

    function generatePDF() {
        const idx = savedSel.value;
        const r = (idx !== '') ? getRecs()[parseInt(idx)] : getState();
        if (!r) { alert('No data. Fill the form or select a saved record.'); return; }

        const basic  = n(r.basic), da = n(r.da), ma = n(r.ma), hra = n(r.hra||0);
        const hrw    = n(r.hrw),   itax = n(r.itax), cpenf = n(r.cpenf);
        const medclm = n(r.medclm), ptax = n(r.ptax || 0), bijlich = n(r.bijlich);
        const esis   = n(r.esiscontr);
        const totalEarn = basic + da + ma + hra;
        const pfContr   = Math.ceil(0.10 * (basic + da));
        const totalDed  = hrw + itax + cpenf + medclm + ptax + bijlich;
        const netSal    = totalEarn - totalDed;
        const fv = v => v.toFixed(1);

        // Fixed-width text layout (dot-matrix style)
        const W   = 110;
        const SEP = '='.repeat(W);

        function place(arr, col, s) {
            s = String(s);
            for (let i = 0; i < s.length; i++) {
                if (col + i < arr.length) arr[col + i] = s[i];
            }
        }
        function makeLine() { return Array(W).fill(' '); }
        function line(fn)   { const a = makeLine(); fn(a); return a.join(''); }

        const lines = [];

        // Line 1: title centred, SNO right
        lines.push(line(a => {
            const title = 'DEVI AHILYA VISHWAVIDYALAYA, INDORE';
            place(a, Math.floor((W - title.length) / 2), title);
            const sno = 'SNO:' + (r.sno || '');
            place(a, W - sno.length, sno);
        }));
        lines.push(SEP);

        const C  = 10, VC = 12, RC = 61, MC = 67;

        lines.push(line(a => {
            place(a, 0,  'DEPT NAME');
            place(a, C,  ':');
            place(a, VC, r.dept || '');
            place(a, MC, 'MONTH:' + (r.month || ''));
        }));
        lines.push(line(a => {
            place(a, 0,  'NAME');
            place(a, C,  ':');
            place(a, VC, r.name || '');
            place(a, RC, 'DESG. ' + (r.desg || ''));
        }));
        lines.push(line(a => {
            place(a, 0,  'EMP NO');
            place(a, C,  ':');
            place(a, VC, (r.empno||'') + ' PF NO.:' + (r.pfno||''));
            const ucsStr = 'UCS:' + (r.ucsno||'');
            const ucsCol = Math.floor((VC + RC - ucsStr.length) / 2);
            place(a, ucsCol, ucsStr);
            place(a, RC, r.grade || '');
        }));
        lines.push(line(a => {
            place(a, 17, 'W.Days');
            place(a, C + 17, ':');
            place(a, VC + 17, (r.wdays||'') + ' PFNO(SF):' + (r.pfnosf||''));
            place(a, RC, 'ESIS No:' + (r.esisno||''));
        }));

        lines.push(SEP);
        lines.push(line(a => { place(a, 5, 'EARNINGS'); place(a, 79, 'DEDUCTIONS'); }));
        lines.push(SEP);

        const earnRows = [['BASIC', basic], ['DA', da], ['MA', ma]];
        if (hra > 0) earnRows.push(['HRA', hra]);

        const dedRows = [];
        if (hrw    > 0) dedRows.push(['HR & W',   hrw]);
        if (itax   > 0) dedRows.push(['I-TAX',    itax]);
        if (cpenf  > 0) dedRows.push(['C-PEN-F',  cpenf]);
        if (medclm > 0) dedRows.push(['MEDCLM',   medclm]);
        if (ptax   > 0) dedRows.push(['ProfTax',    ptax]);
        if (bijlich > 0) dedRows.push(['BIJLI.CH', bijlich]);

        const maxRows = Math.max(earnRows.length, dedRows.length);
        for (let i = 0; i < maxRows; i++) {
            const [eLabel, eVal] = earnRows[i] || ['', null];
            const [dLabel, dVal] = dedRows[i]  || ['', null];
            lines.push(line(a => {
                if (eLabel) place(a, 0, eLabel);
                if (eVal !== null) { const ev = fv(eVal); place(a, 21 - ev.length, ev); }
                place(a, 44, '.');
                if (dLabel) place(a, 64, dLabel);
                if (dVal !== null) { const dv = fv(dVal); place(a, 86 - dv.length, dv); }
            }));
        }

        lines.push(SEP);
        lines.push(line(a => {
            place(a, 0,  'TOTAL EARNINGS:');
            place(a, 16, totalEarn.toFixed(2));
            place(a, 69, 'TOTAL DEDUCTIONS:');
            place(a, 87, totalDed.toFixed(2));
        }));
        lines.push(SEP);
        lines.push(line(a => {
            place(a, 0, '* BANK *');
            const ns = 'NET SAL:' + netSal.toFixed(2);
            place(a, W - ns.length, ns);
            const mid = `c-pen-f  PF Contr.:${pfContr}  ESIS Contr.:${esis > 0 ? fv(esis) : '0.0'}`;
            const leftEdge  = 9;
            const rightEdge = W - ns.length - 1;
            const midStart  = leftEdge + Math.floor((rightEdge - leftEdge - mid.length) / 2);
            place(a, midStart, mid);
        }));
        lines.push('BALANCES:');

        // Render to PDF - A5 Landscape
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a5' });
        doc.setFont('Courier', 'normal');
        doc.setFontSize(8.5);
        const ML = 5, TOP = 25.4, LH = 3.7;
        lines.forEach((txt, i) => doc.text(txt, ML, TOP + i * LH));

        // ★★★ NEW: Filename = <MONTH>.pdf (using selected month, fallback to 'payslip') ★★★
        const monthValue = (r.month || 'payslip').trim();
        // Replace any slash or backslash just to be safe, but month codes are safe.
        const safeMonth = monthValue.replace(/[\\/:"*?<>|]/g, '-'); 
        const filename = safeMonth + '.pdf';
        doc.save(filename);
    }

})();
</script>
</body>
</html>
